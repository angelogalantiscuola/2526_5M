{% extends "base.html" %}

{% block title %}Crea Nuova Categoria{% endblock %}

{% block content %}
<h2>Crea Nuova Categoria</h2>

<form method="post">
    <label for="nome">Nome Categoria:</label>
    <input type="text" id="nome" name="nome" required>

    <button type="submit">Crea Categoria</button>
</form>

<div class="back-link">
    <a href="{{ url_for('main.index') }}">← Torna alle categorie</a>
</div>
{% endblock %}
