{% extends "base.html" %}

{% block title %}Crea Nuovo Piatto{% endblock %}

{% block content %}
<h2>Crea Nuovo Piatto</h2>

<form method="post">
    <label for="categoria_id">Categoria:</label>
    <select id="categoria_id" name="categoria_id" required>
        <option value="">-- Seleziona una categoria --</option>
        {% for category in categories %}
        <option value="{{ category['id'] }}">{{ category['nome'] }}</option>
        {% endfor %}
    </select>

    <label for="nome">Nome Piatto:</label>
    <input type="text" id="nome" name="nome" required>

    <label for="prezzo">Prezzo (€):</label>
    <input type="number" id="prezzo" name="prezzo" step="0.01" min="0" required>

    <button type="submit">Crea Piatto</button>
</form>

<div class="back-link">
    <a href="{{ url_for('main.index') }}">← Torna alle categorie</a>
</div>
{% endblock %}
